name: Esteira CI/CD Python baseada em GitHub Actions
on:
    push:
        branches: [main]
jobs:
  setupEnvironment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Setup enviroment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Flake8
        run: |
          flake8 app/ tests/